name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: amd64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build scanner
        run: cc -O2 -o scanner_macos vendor/find_all_keys_macos.c -framework Foundation

      - name: Build
        run: cargo build --release

      - name: Archive
        run: |
          mkdir -p archive
          cp target/release/tgreader scanner_macos archive/
          cd archive
          tar czf ../tgreader-${{ github.ref_name }}-darwin-${{ matrix.arch }}.tar.gz \
            tgreader scanner_macos

      - uses: actions/upload-artifact@v4
        with:
          name: tgreader-${{ github.ref_name }}-darwin-${{ matrix.arch }}
          path: tgreader-${{ github.ref_name }}-darwin-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tgreader-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: tgreader-*.tar.gz
          generate_release_notes: true
