name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Verify arm64 runner
        run: test "$(uname -m)" = "arm64"

      - name: Build
        run: cargo build --release

      - name: Archive
        run: |
          mkdir -p archive
          cp target/release/tg archive/
          cd archive
          tar czf ../tg-${{ github.ref_name }}-darwin-arm64.tar.gz \
            tg

      - uses: actions/upload-artifact@v7
        with:
          name: tg-${{ github.ref_name }}-darwin-arm64
          path: tg-${{ github.ref_name }}-darwin-arm64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: tg-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: tg-*.tar.gz
          generate_release_notes: true
