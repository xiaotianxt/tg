name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build scanner
        run: cc -O2 -o scanner_macos vendor/find_all_keys_macos.c -framework Foundation

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Verify CLI
        run: cargo run --release -- --help
